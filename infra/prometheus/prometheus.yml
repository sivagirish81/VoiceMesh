global:
  scrape_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: voicemesh-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: voicemesh-event-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["event-worker:9101"]
  - job_name: voicemesh-temporal-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["temporal-worker:9102"]
  - job_name: voicemesh-clickhouse-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse-worker:9103"]
